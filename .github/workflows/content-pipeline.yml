name: Content pipeline

on:
  workflow_dispatch:
  schedule:
    # ~06:00, ~13:00, ~20:00 Turkey (UTC+3)
    - cron: "0 3 * * *"
    - cron: "0 10 * * *"
    - cron: "0 17 * * *"

concurrency:
  group: mybb-content-pipeline
  cancel-in-progress: false

jobs:
  run-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: workers/requirements.txt

      - name: Install dependencies
        run: pip install -r workers/requirements.txt

      - name: Run pipeline
        env:
          MYBB_BASE_URL: ${{ secrets.MYBB_BASE_URL }}
          MYBB_PUBLISH_SECRET: ${{ secrets.MYBB_PUBLISH_SECRET }}
          MYBB_PUBLISH_UID: ${{ secrets.MYBB_PUBLISH_UID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MYBB_TABLE_PREFIX: ${{ secrets.MYBB_TABLE_PREFIX }}
          MYBB_DB_HOST: ${{ secrets.MYBB_DB_HOST }}
          MYBB_DB_PORT: ${{ secrets.MYBB_DB_PORT }}
          MYBB_DB_NAME: ${{ secrets.MYBB_DB_NAME }}
          MYBB_DB_USER: ${{ secrets.MYBB_DB_USER }}
          MYBB_DB_PASSWORD: ${{ secrets.MYBB_DB_PASSWORD }}
          MAX_PUBLISH_PER_RUN: ${{ secrets.MAX_PUBLISH_PER_RUN }}
          MAX_CANDIDATES_PLAN: ${{ secrets.MAX_CANDIDATES_PLAN }}
          WORKER_FORUM_FIDS_JSON: ${{ secrets.WORKER_FORUM_FIDS_JSON }}
          LOG_LEVEL: INFO
        run: python -m workers.pipeline
