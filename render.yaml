services:
  - type: web
    name: mybb-forum
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: MYBB_BASE_URL
        sync: false
      - key: MYBB_SITE_URL
        sync: false
      - key: MYBB_ADMIN_DIR
        sync: false
      - key: MYBB_HIDE_ADMIN_LINKS
        sync: false
      - key: MYBB_SECRET_PIN
        sync: false
      - key: MYBB_ADMIN_BASIC_AUTH_USER
        sync: false
      - key: MYBB_ADMIN_BASIC_AUTH_PASS
        sync: false
      - key: MYBB_SUPER_ADMINS
        sync: false
      - key: MYBB_TABLE_PREFIX
        sync: false
      - key: MYBB_BB_LANGUAGE
        value: turkish
      - key: MYBB_CP_LANGUAGE
        value: turkish
      - key: MYBB_FORUM_NAME
        value: MyBB
      - key: MYBB_SITE_NAME
        value: MyBB
      - key: MYBB_PUBLISH_SECRET
        sync: false
      # Set to 1 once to run migrate + seeds on boot (free tier has no Shell); then remove.
      - key: MYBB_RUN_CLI_AUTOMATION
        sync: false
      - key: MYBB_PUBLISH_UID
        value: "1"
        sync: false
      - key: MYBB_ADMIN_EMAIL
        value: admin@localhost
      - key: MYBB_DB_TYPE
        value: pgsql
      - key: MYBB_DB_HOST
        fromDatabase:
          name: mybb-db
          property: host
      - key: MYBB_DB_PORT
        fromDatabase:
          name: mybb-db
          property: port
      - key: MYBB_DB_NAME
        fromDatabase:
          name: mybb-db
          property: database
      - key: MYBB_DB_USER
        fromDatabase:
          name: mybb-db
          property: user
      - key: MYBB_DB_PASSWORD
        fromDatabase:
          name: mybb-db
          property: password

databases:
  - name: mybb-db
    databaseName: mybb
    user: mybb
    plan: free
